<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chatbot Config</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: #1a1a2e;
      color: #fff;
      padding: 0 32px;
      height: 64px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,.3);
    }
    .back-btn {
      color: #8899aa;
      text-decoration: none;
      font-size: .85rem;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color .15s;
    }
    .back-btn:hover { color: #fff; }
    .header-divider { color: #334; font-size: 1.2rem; }
    header h1 { font-size: 1.1rem; font-weight: 600; flex: 1; }
    .header-status {
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .4px;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 20px;
    }
    .status-ready     { background: #1a7f4b; color: #e6f9f0; }
    .status-error     { background: #c62828; color: #fdecea; }
    .status-indexing  { background: #b36800; color: #fff8e1; }
    .status-pending   { background: #555; color: #f3f4f6; }

    /* ── Layout ── */
    main {
      max-width: 780px;
      margin: 40px auto;
      padding: 0 24px 60px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* ── Bot identity strip ── */
    .identity-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .bot-avatar {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: #e8eef8;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      overflow: hidden;
    }
    .bot-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .bot-name { font-size: 1.15rem; font-weight: 700; }
    .bot-meta-row { display: flex; align-items: center; gap: 10px; margin-top: 3px; flex-wrap: wrap; }
    .bot-company { font-size: .85rem; color: #667; }
    .bot-url { font-size: .78rem; color: #6fb8e5; text-decoration: none; }
    .bot-url:hover { text-decoration: underline; }

    .view-kb-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: transparent;
      color: #2d5a8e;
      border: 1.5px solid #b0c8e8;
      border-radius: 7px;
      padding: 6px 14px;
      font-size: .8rem;
      font-weight: 600;
      text-decoration: none;
      transition: background .15s, color .15s;
      white-space: nowrap;
    }
    .view-kb-btn:hover { background: #e8f0fe; }

    .stats-strip {
      margin-left: auto;
      display: flex;
      gap: 20px;
      background: #f8f9fb;
      border-radius: 8px;
      padding: 10px 16px;
      flex-shrink: 0;
    }
    .stat { text-align: center; }
    .stat-value { font-size: 1.1rem; font-weight: 700; color: #1a1a2e; }
    .stat-label { font-size: .65rem; color: #99a; text-transform: uppercase; letter-spacing: .5px; }

    /* ── Section cards ── */
    .section-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
      overflow: hidden;
    }
    .section-head {
      padding: 16px 24px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .section-title { font-size: .85rem; font-weight: 700; color: #1a1a2e; }
    .section-hint  { font-size: .78rem; color: #99a; }
    .section-body  { padding: 20px 24px; }

    /* ── Textareas ── */
    textarea {
      width: 100%;
      font-family: inherit;
      font-size: .88rem;
      color: #223;
      background: #f8f9fb;
      border: 1.5px solid #e8eaee;
      border-radius: 8px;
      padding: 12px 14px;
      resize: vertical;
      transition: border-color .15s, background .15s;
      line-height: 1.6;
    }
    textarea:focus { outline: none; border-color: #6fb8e5; background: #fff; }
    textarea.mono {
      font-family: 'SFMono-Regular', 'Consolas', monospace;
      font-size: .8rem;
      min-height: 340px;
    }

    /* ── Save row ── */
    .save-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-top: 16px;
    }
    .save-btn {
      background: #1a1a2e;
      color: #fff;
      border: none;
      border-radius: 7px;
      padding: 9px 22px;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    .save-btn:hover { background: #2d2d50; }
    .save-btn:disabled { background: #ccc; cursor: default; }
    .save-btn.saved { background: #1a7f4b; }
    .save-feedback { font-size: .8rem; color: #1a7f4b; display: none; }
    .save-feedback.error { color: #c62828; }

    /* ── Embed block ── */
    .embed-block {
      position: relative;
      background: #1a1a2e;
      border-radius: 8px;
      padding: 14px 16px;
      padding-right: 72px;
    }
    .embed-code {
      font-family: 'SFMono-Regular', 'Consolas', monospace;
      font-size: .78rem;
      color: #c8d8e8;
      line-height: 1.6;
      white-space: pre;
      overflow-x: auto;
    }
    .copy-btn {
      position: absolute;
      top: 10px; right: 10px;
      background: #2d2d50;
      color: #aac;
      border: none;
      border-radius: 5px;
      padding: 5px 12px;
      font-size: .72rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    .copy-btn:hover { background: #3d4a6e; color: #fff; }
    .copy-btn.copied { background: #1a7f4b; color: #fff; }

    /* ── Ingest title input ── */
    .input-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
    .title-input {
      flex: 1;
      font-family: inherit;
      font-size: .85rem;
      color: #223;
      background: #f8f9fb;
      border: 1.5px solid #e8eaee;
      border-radius: 7px;
      padding: 8px 12px;
      transition: border-color .15s, background .15s;
    }
    .title-input:focus { outline: none; border-color: #6fb8e5; background: #fff; }
    .title-label { font-size: .78rem; color: #99a; white-space: nowrap; }

    .ingest-btn {
      background: #2d5a8e;
      color: #fff;
      border: none;
      border-radius: 7px;
      padding: 9px 20px;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    .ingest-btn:hover { background: #1e4070; }
    .ingest-btn:disabled { background: #ccc; cursor: default; }
    .ingest-btn.done { background: #1a7f4b; }

    /* ── Loading/Error ── */
    .loading-state, .error-state {
      text-align: center; padding: 80px 24px; color: #99a;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #e0e3ee;
      border-top-color: #1a1a2e;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <a class="back-btn" href="/dashboard">← Dashboard</a>
  <span class="header-divider">/</span>
  <h1 id="header-title">Loading…</h1>
  <span class="header-status" id="header-status" style="display:none"></span>
</header>

<main id="main">
  <div class="loading-state"><div class="spinner"></div>Loading chatbot…</div>
</main>

<script>
  const BASE = 'http://localhost:3000';
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');

  function statusClass(s) {
    const map = { ready: 'ready', error: 'error', crawling: 'indexing', embedding: 'indexing', indexing: 'indexing', pending: 'pending' };
    return 'status-' + (map[s] || 'pending');
  }

  function embedSnippet(id) {
    return `<script\n  src="${BASE}/widget/chatbot-widget.js"\n  data-chatbot-id="${id}"\n  async\n><\/script>`;
  }

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  async function saveConfig() {
    const btn = document.getElementById('save-btn');
    const feedback = document.getElementById('save-feedback');
    const summary = document.getElementById('summary').value.trim();
    const instructions = document.getElementById('instructions').value;

    btn.disabled = true;
    btn.textContent = 'Saving…';
    feedback.style.display = 'none';
    feedback.classList.remove('error');

    try {
      const res = await fetch(`${BASE}/update-config`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ chatbotId: id, config: { companySummary: summary, systemInstructions: instructions } }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Save failed');

      btn.textContent = 'Saved!';
      btn.classList.add('saved');
      feedback.textContent = 'Changes saved successfully.';
      feedback.style.display = 'inline';
      setTimeout(() => {
        btn.textContent = 'Save Changes';
        btn.classList.remove('saved');
        btn.disabled = false;
        feedback.style.display = 'none';
      }, 2500);
    } catch (err) {
      btn.textContent = 'Save Changes';
      btn.disabled = false;
      feedback.textContent = err.message;
      feedback.classList.add('error');
      feedback.style.display = 'inline';
    }
  }

  async function ingestText() {
    const btn = document.getElementById('ingest-btn');
    const feedback = document.getElementById('ingest-feedback');
    const text = document.getElementById('ingest-text').value.trim();
    const title = document.getElementById('ingest-title').value.trim() || 'Custom Content';

    if (!text) {
      feedback.textContent = 'Please paste some text first.';
      feedback.classList.add('error');
      feedback.style.display = 'inline';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Adding…';
    feedback.style.display = 'none';
    feedback.classList.remove('error');

    try {
      const res = await fetch(`${BASE}/chatbot/${id}/ingest-text`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text, title }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Ingest failed');

      btn.textContent = 'Added!';
      btn.classList.add('done');
      feedback.textContent = `${data.chunksAdded} chunk${data.chunksAdded !== 1 ? 's' : ''} added — ${data.totalChunks} total in knowledge base.`;
      feedback.style.display = 'inline';
      document.getElementById('ingest-text').value = '';
      document.getElementById('ingest-title').value = '';
      setTimeout(() => {
        btn.textContent = 'Add to Knowledge Base';
        btn.classList.remove('done');
        btn.disabled = false;
      }, 3000);
    } catch (err) {
      btn.textContent = 'Add to Knowledge Base';
      btn.disabled = false;
      feedback.textContent = err.message;
      feedback.classList.add('error');
      feedback.style.display = 'inline';
    }
  }

  function copyEmbed() {
    const btn = document.getElementById('copy-btn');
    navigator.clipboard.writeText(embedSnippet(id)).then(() => {
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
    });
  }

  async function load() {
    if (!id) {
      document.getElementById('main').innerHTML = '<div class="error-state">No chatbot ID in URL. <a href="/dashboard">← Back to Dashboard</a></div>';
      return;
    }

    try {
      const res = await fetch(`${BASE}/chatbot/${id}/status`);
      const bot = await res.json();
      if (!res.ok) throw new Error(bot.error || 'Not found');

      const company = bot.companyName || '';
      document.title = `${bot.name} — Config`;
      document.getElementById('header-title').textContent = bot.name;

      const statusEl = document.getElementById('header-status');
      statusEl.textContent = bot.status;
      statusEl.className = `header-status ${statusClass(bot.status)}`;
      statusEl.style.display = '';

      const snippet = embedSnippet(id);
      const safeSnippet = escapeHtml(snippet);

      document.getElementById('main').innerHTML = `

        <!-- Identity -->
        <div class="identity-card">
          <div class="bot-avatar">
            ${bot.profileImage
              ? `<img src="${escapeHtml(bot.profileImage)}" alt="${escapeHtml(bot.name)}" onerror="this.parentElement.textContent='🤖'">`
              : '🤖'}
          </div>
          <div>
            <div class="bot-name">${escapeHtml(bot.name)}</div>
            <div class="bot-meta-row">
              ${company ? `<span class="bot-company">${escapeHtml(company)}</span>` : ''}
              ${bot.baseUrl ? `<a class="bot-url" href="${escapeHtml(bot.baseUrl)}" target="_blank">${escapeHtml(bot.baseUrl)}</a>` : ''}
            </div>
          </div>
          <div class="stats-strip">
            <div class="stat">
              <div class="stat-value">${bot.pagesIndexed ?? '—'}</div>
              <div class="stat-label">Pages</div>
            </div>
            <div class="stat">
              <div class="stat-value">${bot.chunksIndexed ?? '—'}</div>
              <div class="stat-label">Chunks</div>
            </div>
          </div>
          <a class="view-kb-btn" href="/dashboard/knowledge-base.html?id=${id}" target="_blank">📄 View Knowledge Base</a>
        </div>

        <!-- Company Summary -->
        <div class="section-card">
          <div class="section-head">
            <span class="section-title">Company Summary</span>
            <span class="section-hint">One line shown before system instructions</span>
          </div>
          <div class="section-body">
            <textarea id="summary" rows="2" placeholder="One-line summary of what the company does, its services, and contact info…">${escapeHtml(bot.companySummary || '')}</textarea>
          </div>
        </div>

        <!-- System Instructions -->
        <div class="section-card">
          <div class="section-head">
            <span class="section-title">System Instructions</span>
            <span class="section-hint">Full prompt sent to the AI on every conversation</span>
          </div>
          <div class="section-body">
            <textarea id="instructions" class="mono" placeholder="Enter the system prompt for this chatbot…">${escapeHtml(bot.systemInstructions || '')}</textarea>
            <div class="save-row">
              <button class="save-btn" id="save-btn" onclick="saveConfig()">Save Changes</button>
              <span class="save-feedback" id="save-feedback"></span>
            </div>
          </div>
        </div>

        <!-- Additional Content -->
        <div class="section-card">
          <div class="section-head">
            <span class="section-title">Additional Content</span>
            <span class="section-hint">Supplement the crawled site with extra text</span>
          </div>
          <div class="section-body">
            <div class="input-row">
              <span class="title-label">Label:</span>
              <input class="title-input" id="ingest-title" type="text" placeholder="e.g. FAQ, Mission Statement, Programs…" value="" />
            </div>
            <textarea id="ingest-text" rows="8" placeholder="Paste any extra content here — FAQs, bios, program descriptions, contact info, anything the website doesn't cover. It will be chunked and added to the knowledge base alongside the crawled pages."></textarea>
            <div class="save-row">
              <button class="ingest-btn" id="ingest-btn" onclick="ingestText()">Add to Knowledge Base</button>
              <span class="save-feedback" id="ingest-feedback"></span>
            </div>
          </div>
        </div>

        <!-- Embed Code -->
        <div class="section-card">
          <div class="section-head">
            <span class="section-title">Embed Code</span>
            <span class="section-hint">Paste before &lt;/body&gt; on any website</span>
          </div>
          <div class="section-body">
            <div class="embed-block">
              <pre class="embed-code">${safeSnippet}</pre>
              <button class="copy-btn" id="copy-btn" onclick="copyEmbed()">Copy</button>
            </div>
          </div>
        </div>

      `;
    } catch (err) {
      document.getElementById('main').innerHTML = `<div class="error-state">${err.message}. <a href="/dashboard">← Back to Dashboard</a></div>`;
    }
  }

  load();
</script>
</body>
</html>
