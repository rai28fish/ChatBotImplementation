<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chatbot Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }

    #site-frame {
      display: block;
      width: 100%;
      height: 100vh;
      border: none;
      position: relative;
      z-index: 1;
    }

    #error-banner {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0;
      background: #1a1a2e;
      color: #aac;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: .85rem;
      padding: 12px 20px;
      z-index: 100;
      text-align: center;
    }
    #error-banner a { color: #6fb8e5; text-decoration: none; }
    #error-banner a:hover { text-decoration: underline; }

    #mock-bg {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1;
      background: #ffffff;
      font-family: 'Georgia', serif;
      overflow-y: auto;
    }
    .mock-nav {
      background: #fff;
      border-bottom: 2px solid #e8e0d5;
      padding: 16px 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .mock-nav .logo {
      font-size: 1.3rem;
      font-weight: 700;
      color: #2c2c2c;
      letter-spacing: 0.5px;
    }
    .mock-nav .logo span { color: #555; }
    .mock-nav-links { display: flex; gap: 28px; }
    .mock-nav-links a {
      color: #555;
      text-decoration: none;
      font-size: 0.9rem;
      font-family: -apple-system, sans-serif;
    }
    .mock-hero {
      background: linear-gradient(135deg, #f0f4ff 0%, #e8edf8 100%);
      padding: 80px 48px;
      text-align: center;
    }
    .mock-hero h1 {
      font-size: 2.8rem;
      color: #2c2c2c;
      margin-bottom: 18px;
      line-height: 1.2;
    }
    .mock-hero p {
      font-size: 1.1rem;
      color: #666;
      max-width: 560px;
      margin: 0 auto 32px;
      font-family: -apple-system, sans-serif;
      line-height: 1.7;
    }
    .mock-btn {
      background: #4a6fa5;
      color: #fff;
      border: none;
      padding: 14px 32px;
      border-radius: 6px;
      font-size: 1rem;
      cursor: default;
      font-family: -apple-system, sans-serif;
    }
    .mock-cards {
      display: flex;
      gap: 24px;
      padding: 60px 48px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .mock-card {
      background: #fff;
      border: 1px solid #e8e0d5;
      border-radius: 10px;
      padding: 28px;
      width: 220px;
      text-align: center;
    }
    .mock-card .icon { font-size: 2rem; margin-bottom: 12px; }
    .mock-card h3 { font-size: 1rem; color: #2c2c2c; margin-bottom: 8px; }
    .mock-card p { font-size: 0.85rem; color: #888; font-family: -apple-system, sans-serif; line-height: 1.5; }
    .mock-iframe-notice {
      text-align: center;
      padding: 10px;
      background: #fdf6ef;
      font-size: 0.75rem;
      color: #aaa;
      font-family: -apple-system, sans-serif;
      border-top: 1px solid #e8e0d5;
    }
    .mock-iframe-notice a { color: #4a6fa5; }
  </style>
</head>
<body>

  <div id="error-banner"></div>
  <iframe id="site-frame" title="Site Preview" allow="fullscreen"></iframe>

  <div id="mock-bg">
    <nav class="mock-nav">
      <div class="logo" id="mock-logo">Loading…</div>
      <div class="mock-nav-links">
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
      </div>
    </nav>
    <div class="mock-hero">
      <h1 id="mock-title">Welcome</h1>
      <p id="mock-summary">This is a local preview of how the chatbot widget appears on the company website.</p>
      <button class="mock-btn" id="mock-btn">Learn More</button>
    </div>
    <div class="mock-iframe-notice">
      Live site blocked iframe embedding — showing branded preview.
      <a id="mock-site-link" href="#" target="_blank">Visit real site ↗</a>
    </div>
  </div>

  <script>
    (async () => {
      const params  = new URLSearchParams(window.location.search);
      const id      = params.get('id');
      const frame   = document.getElementById('site-frame');
      const banner  = document.getElementById('error-banner');

      if (!id) {
        banner.style.display = 'block';
        banner.textContent = 'No chatbot ID provided. Add ?id=CHATBOT_ID to the URL.';
        return;
      }

      // Update page title
      document.title = `Preview — ${id.slice(0, 8)}…`;

      try {
        const res  = await fetch(`${window.location.origin}/chatbot/${id}/status`);
        const data = await res.json();

        if (!res.ok) {
          banner.style.display = 'block';
          banner.innerHTML = `Chatbot not found. <a href="/dashboard">← Back to Dashboard</a>`;
          return;
        }

        document.title = `Preview — ${data.name || id.slice(0,8)}`;

        if (!data.baseUrl) {
          showMock();
        } else {
          frame.src = data.baseUrl;
          frame.addEventListener('load', () => clearTimeout(iframeTimeout));
          const iframeTimeout = setTimeout(() => showMock(), 8000);
        }

        function showMock() {
          frame.style.display = 'none';
          const mock = document.getElementById('mock-bg');
          mock.style.display = 'block';

          const company = data.companyName || data.name || 'Company';
          const summary = data.companySummary || 'This is a local preview of how the chatbot widget appears on the website.';
          const url = data.baseUrl || '#';

          document.getElementById('mock-logo').textContent = company;
          document.getElementById('mock-title').textContent = `Welcome to ${company}`;
          document.getElementById('mock-summary').textContent = summary;
          document.getElementById('mock-site-link').href = url;
          document.getElementById('mock-site-link').textContent = `Visit ${company} ↗`;
        }

        // Warn if chatbot isn't ready yet
        if (data.status !== 'ready') {
          banner.style.display = 'block';
          banner.innerHTML = `
            Chatbot status: <strong>${data.status}</strong> — widget may not respond until indexing is complete.
            <a href="/dashboard">← Dashboard</a>
          `;
        }

      } catch {
        banner.style.display = 'block';
        banner.innerHTML = `Cannot reach server. Make sure the backend is running. <a href="/dashboard">← Dashboard</a>`;
        return;
      }

      // Load the widget
      const script = document.createElement('script');
      script.src = `${window.location.origin}/widget/chatbot-widget.js`;
      script.setAttribute('data-chatbot-id', id);
      script.async = true;
      document.body.appendChild(script);
    })();
  </script>

</body>
</html>
